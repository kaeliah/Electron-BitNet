name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache BitNet model
        id: cache-bitnet-model
        uses: actions/cache@v4
        with:
          path: models/BitNet-b1.58-2B-4T
          key: bitnet-model-gguf-v1

      - name: Install npm dependencies
        run: npm ci

      - name: Install Hugging Face CLI
        if: steps.cache-bitnet-model.outputs.cache-hit != 'true'
        run: python -m pip install --upgrade huggingface_hub[cli]

      - name: Download bundled BitNet model
        if: steps.cache-bitnet-model.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          huggingface-cli download microsoft/BitNet-b1.58-2B-4T-gguf `
            --local-dir models/BitNet-b1.58-2B-4T `
            --local-dir-use-symlinks False

      - name: Build Astro frontend
        run: npm run build:astro

      - name: Build Windows installer
        run: npm run dist:windows-latest

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ElectronBitnet-0.0.2-windows-installer
          path: |
            dist/ElectronBitnet.exe
            dist/ElectronBitnet.exe.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ElectronBitnet.exe
            dist/ElectronBitnet.exe.blockmap
            dist/latest.yml
          generate_release_notes: true
